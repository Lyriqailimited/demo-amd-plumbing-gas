<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Widget Test</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(232, 96, 76, 0.2), transparent 45%),
          linear-gradient(180deg, #1a0d12 0%, #0d0b10 100%);
        color: #f8e8e4;
      }

      .panel {
        width: min(100%, 420px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.05);
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(232, 96, 76, 0.16);
        color: #ff9d8f;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: rgba(248, 232, 228, 0.78);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="badge">Test Mount</div>
      <h1>VoiceWidget iframe is mounted</h1>
      <p>
        This is a temporary placeholder for <code>/widget.html</code> so the
        test component can be verified visually. Replace this file with your
        real embedded widget page when you are ready.
      </p>
    </main>
  </body>
</html>
